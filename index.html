<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Indian Resin Art — Eternalize Your Moments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Karla:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --amber:#B8763E;
    --cream:#F7F1E6;
    --ink:#22201B;
    --teal:#1F3436;
    --rose:#C77B6B;
    --gold:#C6A15B;
    --cream-dim:#EFE7D6;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'Karla',sans-serif;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;}
  a{color:inherit;}
  img,svg{display:block;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 28px;}

  /* NAV */
  nav{position:sticky;top:0;z-index:50;background:rgba(247,241,230,.92);backdrop-filter:blur(6px);border-bottom:1px solid rgba(34,32,27,.08);}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;max-width:1120px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-weight:600;font-size:20px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--amber);}
  .nav-links{display:flex;gap:30px;font-size:14px;font-weight:500;}
  .nav-links a{text-decoration:none;opacity:.75;transition:opacity .2s;}
  .nav-links a:hover{opacity:1;}
  .nav-cta{background:var(--ink);color:var(--cream);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;text-decoration:none;}
  @media(max-width:760px){.nav-links{display:none;}}

  /* HERO */
  .hero{background:var(--teal);color:var(--cream);position:relative;overflow:hidden;}
  .hero-inner{max-width:1120px;margin:0 auto;padding:90px 28px 110px;display:grid;grid-template-columns:1.1fr .9fr;gap:60px;align-items:center;}
  .eyebrow{font-size:12px;text-transform:uppercase;color:var(--gold);margin-bottom:18px;}
  .hero h1{font-size:56px;line-height:1.04;font-weight:600;margin:0 0 22px;}
  .hero h1 em{font-style:italic;color:var(--rose);}
  .hero p{font-size:17px;line-height:1.6;color:rgba(247,241,230,.8);max-width:440px;margin:0 0 32px;}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;}
  .btn-primary{background:var(--rose);color:var(--ink);padding:14px 28px;border-radius:100px;text-decoration:none;font-weight:700;font-size:14px;border:none;cursor:pointer;}
  .btn-ghost{border:1px solid rgba(247,241,230,.35);color:var(--cream);padding:14px 28px;border-radius:100px;text-decoration:none;font-weight:500;font-size:14px;}
  .stat-row{display:flex;gap:34px;margin-top:46px;}
  .stat b{display:block;font-family:'Fraunces',serif;font-size:26px;}
  .stat span{font-size:12px;color:rgba(247,241,230,.6);}

  .medallion-wrap{position:relative;width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;}
  .medallion{width:78%;aspect-ratio:1/1;border-radius:50%;background:radial-gradient(circle at 32% 28%, #E7C88B 0%, #B8763E 42%, #7A4E28 100%);box-shadow:0 0 0 6px rgba(198,161,91,.5), 0 30px 60px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;position:relative;}
  .medallion::after{content:'';position:absolute;inset:14px;border-radius:50%;border:1px solid rgba(255,255,255,.25);}
  .medallion .icon{width:64px;height:64px;object-fit:cover;border-radius:50%;filter:drop-shadow(0 6px 10px rgba(0,0,0,.35));background:rgba(0,0,0,.15);}
  .ring-orbit{position:absolute;inset:0;border-radius:50%;border:1px dashed rgba(198,161,91,.35);animation:spin 26s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .chip{position:absolute;background:var(--cream);color:var(--ink);padding:8px 14px;border-radius:100px;font-size:12px;font-weight:700;box-shadow:0 8px 20px rgba(0,0,0,.25);}
  .chip.c1{top:6%;left:-4%;}
  .chip.c2{bottom:8%;right:-6%;}
  @media(max-width:820px){.hero-inner{grid-template-columns:1fr;}.hero h1{font-size:38px;}.medallion-wrap{max-width:280px;margin:0 auto;}}

  /* SECTION HEADS */
  .section{padding:90px 0;}
  .section-head{max-width:560px;margin:0 0 50px;}
  .section-head .eyebrow{color:var(--amber);}
  .section-head h2{font-size:36px;font-weight:600;margin:0 0 12px;}
  .section-head p{color:rgba(34,32,27,.65);font-size:16px;line-height:1.6;}
  .section.dark{background:var(--ink);color:var(--cream);}
  .section.dark .section-head p{color:rgba(247,241,230,.6);}

  /* CATEGORY PILLS */
  .pill-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:56px;}
  .pill{border:1px solid rgba(34,32,27,.18);padding:9px 18px;border-radius:100px;font-size:13px;font-weight:500;background:transparent;cursor:pointer;}
  .pill.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}

  /* PRODUCT GRID - medallion cards */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
  .card{text-align:center;}
  .card-medal{width:100%;aspect-ratio:1/1;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 14px 30px rgba(34,32,27,.15);}
  .card-medal::before{content:'';position:absolute;inset:0;border-radius:50%;border:3px solid var(--gold);}
  .card-medal .card-img{width:70%;height:70%;object-fit:cover;border-radius:50%;background:rgba(0,0,0,.1);}
  .card h3{font-size:16px;margin:0 0 4px;font-weight:600;}
  .card .price{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--amber);}

  /* PROCESS */
  .process{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
  @media(max-width:900px){.process{grid-template-columns:1fr;gap:34px;}}
  .process-line{position:absolute;top:22px;left:6%;right:6%;height:1px;background:rgba(247,241,230,.2);}
  @media(max-width:900px){.process-line{display:none;}}
  .step{padding:0 18px;position:relative;}
  .step .num{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold);display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border:1px solid var(--gold);border-radius:50%;background:var(--ink);position:relative;z-index:2;margin-bottom:20px;}
  .step h3{font-size:17px;margin:0 0 8px;font-weight:600;}
  .step p{font-size:14px;color:rgba(247,241,230,.6);line-height:1.55;margin:0;}

  /* TESTIMONIALS */
  .testi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  @media(max-width:900px){.testi-row{grid-template-columns:1fr;}}
  .testi{background:var(--cream-dim);border-radius:18px;padding:28px;display:flex;flex-direction:column;gap:16px;}
  .testi-head{display:flex;align-items:center;gap:12px;}
  .avatar{width:42px;height:42px;border-radius:50%;background:var(--amber);flex-shrink:0;object-fit:cover;}
  .testi-head b{display:block;font-size:14px;}
  .testi-head span{font-size:12px;color:rgba(34,32,27,.55);}
  .testi p{font-size:14px;line-height:1.6;color:rgba(34,32,27,.75);margin:0;font-style:italic;}

  /* ORDER FORM */
  .order-panel{background:var(--teal);color:var(--cream);border-radius:24px;padding:56px;display:grid;grid-template-columns:1fr 1fr;gap:50px;}
  @media(max-width:820px){.order-panel{grid-template-columns:1fr;padding:34px;}}
  .order-panel h2{font-size:30px;margin:0 0 14px;}
  .order-panel p{color:rgba(247,241,230,.65);font-size:14px;line-height:1.6;}
  .form-field{margin-bottom:16px;}
  .form-field label{display:block;font-size:12px;margin-bottom:6px;color:rgba(247,241,230,.7);}
  .form-field input,.form-field select,.form-field textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(247,241,230,.25);background:rgba(247,241,230,.06);color:var(--cream);font-family:'Karla',sans-serif;font-size:14px;}
  .form-field textarea{resize:vertical;min-height:80px;}
  .form-field input::placeholder,.form-field textarea::placeholder{color:rgba(247,241,230,.4);}
  .submit-btn{background:var(--rose);color:var(--ink);border:none;padding:14px 26px;border-radius:100px;font-weight:700;font-size:14px;cursor:pointer;width:100%;}
  .confirm{background:rgba(199,123,107,.15);border:1px solid var(--rose);padding:14px 16px;border-radius:12px;font-size:13px;margin-top:14px;}

  footer{background:var(--ink);color:rgba(247,241,230,.55);padding:50px 0 30px;font-size:13px;}
  .footer-inner{display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:30px;}
  .footer-brand{font-family:'Fraunces',serif;color:var(--cream);font-size:20px;}
  .footer-links{display:flex;gap:26px;}
  .footer-links a{text-decoration:none;}
  .footer-bottom{border-top:1px solid rgba(247,241,230,.1);padding-top:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

const PRODUCTS = [
  {img:"https://i.etsystatic.com/7867111/r/il/e1ed54/5990973524/il_600x600.5990973524_g63a.jpg", name:"Milk Tooth Keepsake", price:"₹1,299", cat:"Baby Keepsakes"},
  {img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTj844abSH51PxNo-f5An1IuqDHl4Wu5HzppGAb6hTckvBJZxeqsgGyAX_U&s=10", name:"Wedding Flower Pendant", price:"₹1,899", cat:"Gift Ideas"},
  {img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRacTcwRViKewxyjq6yGZ-AnhBkvb0bOlkQmW1Ba8n8zYAFYHgi_ohqvPw&s=10", name:"Photo Frame Cast", price:"₹2,499", cat:"Custom Orders"},
  {img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLB74psTrBfhewMvdDNM_ZX05vCWKJJnsIjFrzCwqA2A&s=10", name:"Hair Preservation Locket", price:"₹1,599", cat:"Baby Keepsakes"},
  {img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQMgNbKCJqCcw4sFtCa_YGGqraTdXWWVz3pI0CmF9LeYw&s=10", name:"Ring Bearer Charm", price:"₹1,799", cat:"Bestsellers"},
  {img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQe5iQV4i-Lt1zBDgk8-XupnXeuHvTbSCF1q7p3NVggjg&s=10", name:"Bouquet Rose Cast", price:"₹1,499", cat:"Gift Ideas"},
  {img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWxAxtrYU1WeSyYJN4Jo4ND1hgxFSq3zVbADesBwCGngyG59Xl7XLC1xkd&s=10", name:"Umbilical Cord Charm", price:"₹1,999", cat:"Baby Keepsakes"},
  {img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTCfP-IkGdUAO0Wi1yehjAkxmqcJoo1NKccrPxgnmr7QCpNE-ygEyavDVCn&s=10", name:"Custom Photo Keychain", price:"₹899", cat:"Custom Orders"},
];

const CATS = ["All","Gift Ideas","Baby Keepsakes","Custom Orders","Bestsellers"];

const STEPS = [
  {n:"01", t:"Send your item", d:"Post or courier the tooth, flower, hair lock or photo you want preserved — we provide safe packaging instructions."},
  {n:"02", t:"We clean & arrange", d:"Our artisans sanitize and compose the item by hand, matching frame size and colour to your request."},
  {n:"03", t:"Cast in resin", d:"The piece is hand-poured in food-grade resin and cured over 48 hours to lock in every detail, bubble-free."},
  {n:"04", t:"Polished & shipped", d:"Each piece is sanded, polished to a glass-like finish, and shipped worldwide with tracking."},
];

const TESTIMONIALS = [
  {name:"Priya S.", place:"Mumbai, IN", text:"They turned my daughter's first curl into a locket I'll have forever. The detail inside the resin is incredible."},
  {name:"Meera R.", place:"London, UK", text:"Ordered a wedding bouquet cast from India to the UK — arrived perfectly packed and even more beautiful in person."},
  {name:"Ananya K.", place:"Bengaluru, IN", text:"The milk tooth keepsake is so delicate and clear. Customer service replied within minutes on Instagram DM."},
];

function Nav(){
  return (
    <nav>
      <div className="nav-inner">
        <div className="brand"><span className="dot"></span>Indian Resin Art</div>
        <div className="nav-links">
          <a href="#gallery">Gallery</a>
          <a href="#process">Process</a>
          <a href="#testimonials">Reviews</a>
          <a href="#order">Custom Order</a>
        </div>
        <a className="nav-cta" href="#order">Start an order</a>
      </div>
    </nav>
  );
}

function Hero(){
  return (
    <section className="hero">
      <div className="hero-inner">
        <div>
          <div className="eyebrow mono">HANDCRAFTED · INDIAN-MADE · WORLDWIDE DELIVERY</div>
          <h1>Cast the moment<br/>before it <em>fades</em>.</h1>
          <p>We preserve baby teeth, first curls, wedding flowers and photographs in hand-poured resin — 112 pieces made, 14.5K families trusting us with their memories.</p>
          <div className="hero-ctas">
            <a className="btn-primary" href="#order">Start a custom piece</a>
            <a className="btn-ghost" href="#gallery">View gallery</a>
          </div>
          <div className="stat-row">
            <div className="stat"><b>112</b><span>Pieces crafted</span></div>
            <div className="stat"><b>14.5K</b><span>Followers</span></div>
            <div className="stat"><b>70+</b><span>Countries shipped</span></div>
          </div>
        </div>
        <div className="medallion-wrap">
          <div className="ring-orbit"></div>
          <div className="medallion">
            <img className="icon" src="https://api.imghippo.com/files/PRDH5546pZU.png" alt="Featured resin piece"  />
          </div>
          <div className="chip c1">✦ Made to order</div>
          <div className="chip c2">DM for pricing</div>
        </div>
      </div>
    </section>
  );
}

function Gallery(){
  const [active, setActive] = useState("All");
  const filtered = active === "All" ? PRODUCTS : PRODUCTS.filter(p => p.cat === active);
  const palette = ["#B8763E","#C77B6B","#23383A","#C6A15B"];
  return (
    <section className="section" id="gallery">
      <div className="wrap">
        <div className="section-head">
          <div className="eyebrow mono">THE COLLECTION</div>
          <h2>Every piece, one of a kind</h2>
          <p>Browse by category — every cast is made from your own keepsake, so no two pieces are ever the same.</p>
        </div>
        <div className="pill-row">
          {CATS.map(c => (
            <button key={c} className={"pill" + (active===c ? " active":"")} onClick={()=>setActive(c)}>{c}</button>
          ))}
        </div>
        <div className="grid">
          {filtered.map((p,i)=>(
            <div className="card" key={p.name}>
              <div className="card-medal" style={{background:`radial-gradient(circle at 35% 30%, ${palette[i%4]}55, ${palette[i%4]})`}}>
                <img className="card-img" src={p.img} alt={p.name} />
              </div>
              <h3>{p.name}</h3>
              <div className="price">{p.price}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Process(){
  return (
    <section className="section dark" id="process">
      <div className="wrap">
        <div className="section-head">
          <div className="eyebrow mono">HOW IT'S MADE</div>
          <h2>From your hands to the resin, in four steps</h2>
          <p>A real, sequential process — each stage has to finish before the next begins, start to finish in about 10–14 days.</p>
        </div>
        <div className="process">
          <div className="process-line"></div>
          {STEPS.map(s=>(
            <div className="step" key={s.n}>
              <div className="num">{s.n}</div>
              <h3>{s.t}</h3>
              <p>{s.d}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Testimonials(){
  return (
    <section className="section" id="testimonials">
      <div className="wrap">
        <div className="section-head">
          <div className="eyebrow mono">FAMILIES WE'VE MADE PIECES FOR</div>
          <h2>Loved by 14.5K followers worldwide</h2>
        </div>
        <div className="testi-row">
          {TESTIMONIALS.map(t=>(
            <div className="testi" key={t.name}>
              <p>"{t.text}"</p>
              <div className="testi-head">
                <img className="avatar" src="#" alt={t.name} />
                <div>
                  <b>{t.name}</b>
                  <span>{t.place}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function OrderForm(){
  const [submitted, setSubmitted] = useState(false);
  const [form, setForm] = useState({name:"",email:"",category:"Baby Keepsakes",details:""});

  function handleChange(e){
    setForm({...form, [e.target.name]: e.target.value});
  }

  function handleSubmit(e){
    e.preventDefault();
    // In the full build, this posts to the Django API — see /api/orders/ in backend/shop/views.py
    console.log("Order submitted (mock):", form);
    setSubmitted(true);
  }

  return (
    <section className="section" id="order">
      <div className="wrap">
        <div className="order-panel">
          <div>
            <div className="eyebrow mono" style={{color:"#C6A15B"}}>CUSTOM ORDER</div>
            <h2>Tell us what you'd like eternalized</h2>
            <p>Fill this in and our team will DM or email you shipping instructions and a quote within 24 hours. This form is a working mockup — wire it to the Django backend's <code>/api/orders/</code> endpoint to make it live.</p>
          </div>
          <form onSubmit={handleSubmit}>
            <div className="form-field">
              <label>Your name</label>
              <input name="name" value={form.name} onChange={handleChange} placeholder="Priya Sharma" required/>
            </div>
            <div className="form-field">
              <label>Email</label>
              <input type="email" name="email" value={form.email} onChange={handleChange} placeholder="you@example.com" required/>
            </div>
            <div className="form-field">
              <label>Category</label>
              <select name="category" value={form.category} onChange={handleChange}>
                <option>Baby Keepsakes</option>
                <option>Gift Ideas</option>
                <option>Custom Orders</option>
                <option>Bestsellers</option>
              </select>
            </div>
            <div className="form-field">
              <label>What would you like preserved?</label>
              <textarea name="details" value={form.details} onChange={handleChange} placeholder="e.g. My son's first curl of hair, in a gold-rimmed circular pendant..." required/>
            </div>
            <button className="submit-btn" type="submit">Request a quote</button>
            {submitted && <div className="confirm">Thanks, {form.name || "friend"} — your request has been noted (mock submission). Connect this form to Django to send it for real.</div>}
          </form>
        </div>
      </div>
    </section>
  );
}

function Footer(){
  return (
    <footer>
      <div className="wrap">
        <div className="footer-inner">
          <div className="footer-brand">Indian Resin Art</div>
          <div className="footer-links">
            <a href="#gallery">Gallery</a>
            <a href="#process">Process</a>
            <a href="#order">Custom Order</a>
            <a href="#">Instagram</a>
          </div>
        </div>
        <div className="footer-bottom">
          <span>© 2026 Indian Resin Art. Handcrafted in India, delivered worldwide.</span>
          <span className="mono">MOCKUP BUILD — v0.1</span>
        </div>
      </div>
    </footer>
  );
}

function App(){
  return (
    <React.Fragment>
      <Nav/>
      <Hero/>
      <Gallery/>
      <Process/>
      <Testimonials/>
      <OrderForm/>
      <Footer/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
